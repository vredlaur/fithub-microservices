server:
  port: 8083

spring:
  application:
    name: booking-service
  profiles:
    active: dev

app:
  jwt:
    secret: ${JWT_SECRET:fithub-local-secret-key-change-me}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html
